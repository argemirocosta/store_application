      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>

    <ui:insert name="title">
        <title>Sempre Bella</title>
    </ui:insert>

    <link href="../css/style.css" type="text/css" rel="stylesheet"/>

    <script type="text/javascript">
        PrimeFaces.locales['pt'] = {
            closeText: 'Fechar',
            prevText: 'Anterior',
            nextText: 'Próximo',
            currentText: 'Começo',
            monthNames: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'],
            monthNamesShort: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'],
            dayNames: ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'],
            dayNamesShort: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'],
            dayNamesMin: ['D', 'S', 'T', 'Q', 'Q', 'S', 'S'],
            weekHeader: 'Semana',
            firstDay: 1,
            isRTL: false,
            showMonthAfterYear: false,
            yearSuffix: '',
            timeOnlyTitle: 'Só Horas',
            timeText: 'Tempo',
            hourText: 'Hora',
            minuteText: 'Minuto',
            secondText: 'Segundo',
            currentText: 'Data Atual',
            ampm: false,
            month: 'Mês',
            week: 'Semana',
            day: 'Dia',
            allDayText: 'Todo Dia'
        };
    </script>

</h:head>
<h:body>
    <p:ajaxStatus onstart="PF('statusDialog').show();"
                  onsuccess="PF('statusDialog').hide();"/>
    <p:dialog id="myDialogId" styleClass="process_msg" modal="true"
              showHeader="true" header="Processando..."
              style="width:40px; height:20px; border:0;" resizable="false"
              widgetVar="statusDialog" draggable="false" closable="false">
        <div style="text-align: center;">
            <p:graphicImage value="../imgs/ajax_loading_bar.gif"/>
        </div>
    </p:dialog>

    <div id="container" class="clearfix">
        <div id="content">
            <p:messages for="home-msg" globalOnly="true"/>

            <ui:insert name="content"/>
        </div>
    </div>

</h:body>
</html>
