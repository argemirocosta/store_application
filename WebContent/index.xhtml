<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<h:head>

	<title>Sempre Bella</title>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<div align="center">
		<p:outputLabel value="Sempre Bella" styleClass="nomePrincipal" />
	</div>

	<link href="css/style.css" type="text/css" rel="stylesheet" />

</h:head>

<h:body>

	<h:form id="form">

		<p:growl id="growl" showDetail="true" />

		<div align="center">

			<p:graphicImage styleClass="imagemPrincipal"
				value="imgs/semprebella.JPG"  />

			<p:panel header="Acesse o sistema:" style="width:90%;max-width:300px;">

				<p:panelGrid columns="2" styleClass="semBorda">
					<p:outputLabel value="Usuário:" />
					<p:inputText value="#{usuarioMB.usuario.login}"
						required="true" requiredMessage="Informe o usuário." />
					<p:outputLabel value="Senha:" />
					<p:password value="#{usuarioMB.usuario.senha}"
						required="true" requiredMessage="Informe a senha." />
				</p:panelGrid>

				<p:separator />
				<p:commandButton value="Entrar" icon="confirmar"
                                 action="#{usuarioMB.login()}" update="growl" />
			</p:panel>

		</div>
	</h:form>


</h:body>
</html>
